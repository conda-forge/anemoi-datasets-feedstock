{% set version = "0.5.38" %}
{% set python_min = "3.11" %}

package:
  name: anemoi-datasets
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/anemoi-datasets/anemoi_datasets-{{ version }}.tar.gz
  sha256: dc5fd0e4955b87be023059bce38f448d8a063f5be558b25389e4cba318ea0aa5

build:
  entry_points:
    - anemoi-datasets = anemoi.datasets.__main__:main
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - anemoi-transform >=0.1.27
    - anemoi-utils >=0.5
    - cfunits
    - glom
    - jsonschema
    - numcodecs <0.16
    - numpy
    - pytest >=8.4.1
    - pytest-xdist >=3.7
    - pyyaml
    - ruamel.yaml >=0.16
    - semantic_version
    - tqdm
    - zarr <=2.18.7

test:
  imports:
    - anemoi
  commands:
    - anemoi-datasets --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ecmwf/anemoi-datasets/
  summary: A package to hold various functions to support training of ML models on ECMWF data.
  doc_url: https://anemoi-datasets.readthedocs.io/
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tjtg
    - jasonjunweilyu
    - HCookie
